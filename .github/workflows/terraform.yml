name: Terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="os_type=windowsserver2022" -var="instance_name=test-ec2-tf" -var="instance_type=t3.micro" -var

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="os_type=windowsserver2022" -var="instance_name=test-ec2-tf" -var="instance_type=t3.micro"